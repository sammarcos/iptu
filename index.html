<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Boletos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#191724] text-slate-200">
    <div id="app_root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
      window.__babelTransformCache = {};

      // es-module-shims expõe esse hook pra interceptar módulos
      window.esmsInitOptions = {
        fetch: async (url, options) => {
          // só intercepta arquivos locais .jsx (ou .js com JSX)
          if (
            /\.(jsx)$/.test(url) ||
            (url.startsWith(location.origin) && /\.(js|jsx)$/.test(url))
          ) {
            if (window.__babelTransformCache[url]) {
              return new Response(window.__babelTransformCache[url], {
                headers: { 'Content-Type': 'application/javascript' },
              });
            }
            const res = await fetch(url, options);
            const src = await res.text();
            const { code } = Babel.transform(src, {
              presets: [['react', { runtime: 'automatic' }]],
              filename: url,
            });
            window.__babelTransformCache[url] = code;
            return new Response(code, {
              headers: { 'Content-Type': 'application/javascript' },
            });
          }
          return fetch(url, options);
        },
      };
    </script>

    <script
      async
      src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"
    ></script>

    <script type="importmap-shim">
      {
        "imports": {
          "react": "https://esm.sh/react@19",
          "react-dom/client": "https://esm.sh/react-dom@19/client",
          "react-router-dom": "https://esm.sh/react-router-dom@6",

          "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
          "react/jsx-dev-runtime": "https://esm.sh/react@19/jsx-dev-runtime",
               "react-icons/fa": "https://esm.sh/react-icons@5.2.1/fa"
        }
      }
    </script>

    <script type="module-shim" src="./index.jsx"></script>
  </body>
</html>
